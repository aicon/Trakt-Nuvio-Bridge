services:
  trakt-nuvio-bridge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APPNAME: trakt-nuvio-bridge
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: trakt-nuvio-bridge:${VERSION:-latest}
    container_name: trakt-nuvio-bridge
    ports:
      - "${HOST_PORT:-4173}:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID:?set TRAKT_CLIENT_ID in .env}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET:?set TRAKT_CLIENT_SECRET in .env}
      TRAKT_REDIRECT_URI: ${TRAKT_REDIRECT_URI:?set TRAKT_REDIRECT_URI in .env}
      TRAKT_CALLBACK_ORIGIN: ${TRAKT_CALLBACK_ORIGIN:?set TRAKT_CALLBACK_ORIGIN in .env}
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
